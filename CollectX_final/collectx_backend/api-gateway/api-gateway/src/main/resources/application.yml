server:
  port: 8888

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/auth/**

        - id: iam-admin
          uri: lb://iam-service
          predicates:
            - Path=/admin/**

        - id: portfolio-service
          uri: lb://portfolio-service
          predicates:
            - Path=/portfolio/**

        - id: strategy-service
          uri: lb://strategy-service
          predicates:
            - Path=/strategy/**

        - id: dunning-service
          uri: lb://dunning-service
          predicates:
            - Path=/dunning/**

        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/agent/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payment/**

        - id: field-service
          uri: lb://field-service
          predicates:
            - Path=/field/**

        - id: legal-service
          uri: lb://legal-service
          predicates:
            - Path=/legal/**

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/report/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notify/**

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/customer/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.collectx.gateway: DEBUG
